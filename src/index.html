<!DOCTYPE html>
<html lang="ja" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Litest by monochrome.</title>
    <link rel="stylesheet" href="./style/main.css">
    <script src="./script/background.js"></script>
    <script src="./script/accent.js" charset="utf-8"></script>
  </head>
  <body>
    <dock-bar>
      <time-el onclick="openTime();" tabindex="1"></time-el>
      <div id="openLocker" tabindex="2"></div>
      <div id="closeLocker" tabindex="2"></div>
      <app-icon data-name="calc" title="Calc" tabindex="3"></app-icon>
      <app-icon data-name="search" title="Search" tabindex="4"></app-icon>
      <app-icon data-name="commands" title="Commands" tabindex="5"></app-icon>
      <app-icon data-name="settings" title="Settings" tabindex="6"></app-icon>
      <br>
      <div id="searching"><input type="search" tabindex="7"><button type="button" onclick="go();" tabindex="8"></button></div>
      <locker-main>
        <div class="app" onclick="window.open(`file://${node.get__dirname()}/../app/calc/index.html`,'calc','width=450,height=538.25');">
          <app-icon data-name="calc"></app-icon>
          <p>Calc</p>
        </div>
        <div class="app" onclick="window.open(`file://${node.get__dirname()}/../app/search/index.html`,'search','width=800,height=500');">
          <app-icon data-name="search"></app-icon>
          <p>Search</p>
        </div>
        <div class="app" onclick="window.open(`file://${node.get__dirname()}/../app/commands/index.html`,'commands','width=750,height=475');">
          <app-icon data-name="commands"></app-icon>
          <p>Commands</p>
        </div>
        <div class="app" onclick="window.open(`file://${node.get__dirname()}/../app/settings/index.html`,'settings','width=1000,height=650');">
          <app-icon data-name="settings"></app-icon>
          <p>Settings</p>
        </div>
      </locker-main>
    </dock-bar>

    <time-dialog>
      <a href="javascript:closeTime()">
        <time-el></time-el>
        <date-el></date-el>
      <a href="javascript:window.close();">終了</a>
    </time-dialog>

    <script src="./script/time.js" charset="utf-8"></script>
    <script src="./script/iconclick.js" charset="utf-8"></script>
    <script src="./script/search.js" charset="utf-8"></script>
  </body>
</html>
